<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMTI 牛马测试 - 发现你的职场人格</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        /* 首页样式 */
        .home-page {
            padding: 60px 40px;
            text-align: center;
        }

        .logo {
            font-size: 72px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }

        .subtitle {
            font-size: 18px;
            color: #666;
            margin-bottom: 40px;
        }

        .intro-text {
            font-size: 16px;
            color: #888;
            line-height: 1.8;
            margin-bottom: 40px;
            padding: 0 20px;
        }

        .dimensions-preview {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

        .dimension-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            text-align: left;
        }

        .dimension-card h3 {
            font-size: 14px;
            color: #999;
            margin-bottom: 8px;
        }

        .dimension-card p {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 60px;
            font-size: 20px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        /* 测试页面样式 */
        .test-page {
            display: none;
            padding: 40px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 0.3s;
        }

        .question-counter {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .question-text {
            font-size: 22px;
            font-weight: 600;
            color: #333;
            text-align: center;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            background: #f8f9fa;
            border: 2px solid #eee;
            padding: 20px 25px;
            font-size: 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }

        .option-btn:hover {
            background: #f0f0ff;
            border-color: #667eea;
        }

        /* 结果页面样式 */
        .result-page {
            display: none;
            padding: 50px 40px;
            text-align: center;
        }

        .result-emoji {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .result-name {
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .result-name .en-name {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .result-name .cn-name {
            display: block;
            font-size: 32px;
            font-weight: 800;
            color: #333;
            margin-top: 5px;
        }

        .result-type {
            font-size: 14px;
            color: #999;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .result-description {
            font-size: 16px;
            color: #666;
            line-height: 1.8;
            text-align: left;
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .result-traits {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .trait-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: left;
        }

        .trait-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
        }

        .trait-value {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .result-tips {
            background: linear-gradient(135deg, #fff5f5 0%, #fff0f5 100%);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: left;
        }

        .result-tips h4 {
            color: #e91e63;
            margin-bottom: 10px;
        }

        .result-tips p {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }

        .restart-btn {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .restart-btn:hover {
            background: #667eea;
            color: white;
        }

        .share-text {
            margin-top: 20px;
            font-size: 14px;
            color: #999;
        }

        @media (max-width: 600px) {
            .title {
                font-size: 36px;
            }
            .dimensions-preview {
                grid-template-columns: 1fr;
            }
            .result-traits {
                grid-template-columns: 1fr;
            }
            .result-name .en-name {
                font-size: 22px;
            }
            .result-name .cn-name {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 首页 -->
        <div class="home-page" id="homePage">
            <div class="logo">🐂🐎</div>
            <h1 class="title">NMTI 牛马测试</h1>
            <p class="subtitle">发现你的职场人格，认清你的牛马本质</p>
            
            <div class="intro-text">
                你是职场里的哪种牛马？是摸鱼高手还是卷王之王？<br>
                是社恐患者还是社牛达人？是躺平派还是奋斗逼？<br>
                完成测试，解锁你的专属牛马人格！
            </div>

            <div class="dimensions-preview">
                <div class="dimension-card">
                    <h3>维度一</h3>
                    <p>M 摸鱼型 ↔ J 卷王型</p>
                </div>
                <div class="dimension-card">
                    <h3>维度二</h3>
                    <p>S 社恐型 ↔ K 社牛型</p>
                </div>
                <div class="dimension-card">
                    <h3>维度三</h3>
                    <p>T 躺平型 ↔ P 奋斗型</p>
                </div>
                <div class="dimension-card">
                    <h3>维度四</h3>
                    <p>Q 清醒型 ↔ H 糊涂型</p>
                </div>
            </div>

            <button class="start-btn" onclick="startTest()">开始测试</button>
        </div>

        <!-- 测试页面 -->
        <div class="test-page" id="testPage">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="question-counter" id="questionCounter">1 / 10</div>
            <div class="question-text" id="questionText"></div>
            <div class="options" id="optionsContainer"></div>
        </div>

        <!-- 结果页面 -->
        <div class="result-page" id="resultPage">
            <div class="result-emoji" id="resultEmoji"></div>
            <div class="result-name" id="resultName"></div>
            <div class="result-type" id="resultType"></div>
            <div class="result-description" id="resultDescription"></div>
            <div class="result-traits" id="resultTraits"></div>
            <div class="result-tips" id="resultTips"></div>
            <button class="restart-btn" onclick="restartTest()">再测一次</button>
            <p class="share-text">截图分享给朋友，看看谁是你的职场搭子</p>
        </div>
    </div>

    <script>
        // NMTI 测试题目（10题）
        const questions = [
            // M/J 维度 - 摸鱼 vs 卷王（3题）
            {
                text: "周五下午5点，领导突然在群里发了一条消息，你会？",
                options: [
                    { text: "假装没看见，周一再说", type: "M" },
                    { text: "秒回'收到'并立即处理", type: "J" }
                ]
            },
            {
                text: "领导布置了一个任务，要求'下周完成'，你通常会？",
                options: [
                    { text: "最后一天晚上才开始做", type: "M" },
                    { text: "当天就开始规划，争取提前完成", type: "J" }
                ]
            },
            {
                text: "开会时，你通常在做什么？",
                options: [
                    { text: "神游太虚，或者偷偷刷手机", type: "M" },
                    { text: "认真记笔记，积极发言", type: "J" }
                ]
            },

            // S/K 维度 - 社恐 vs 社牛（2题）
            {
                text: "公司团建，你最期待的是？",
                options: [
                    { text: "能不去就不去，去了也是躲在角落", type: "S" },
                    { text: "太棒了！又能认识新朋友了", type: "K" }
                ]
            },
            {
                text: "电梯里遇到不太熟的同事，你会？",
                options: [
                    { text: "低头看手机，祈祷电梯快点到", type: "S" },
                    { text: "主动打招呼，顺便聊几句", type: "K" }
                ]
            },

            // T/P 维度 - 躺平 vs 奋斗（3题）
            {
                text: "看到同事跳槽涨薪50%，你的想法是？",
                options: [
                    { text: "他好累吧，我这样挺好的", type: "T" },
                    { text: "我也要提升自己，争取更好的机会", type: "P" }
                ]
            },
            {
                text: "周末你的状态通常是？",
                options: [
                    { text: "睡到自然醒，追剧打游戏", type: "T" },
                    { text: "学习充电，或者做副业", type: "P" }
                ]
            },
            {
                text: "你理想的工作状态是？",
                options: [
                    { text: "钱多事少离家近，能摸鱼就摸鱼", type: "T" },
                    { text: "有挑战有成长，能学到东西最重要", type: "P" }
                ]
            },

            // Q/H 维度 - 清醒 vs 糊涂（2题）
            {
                text: "领导说'你很有潜力'，你的理解是？",
                options: [
                    { text: "画饼而已，听听就好", type: "Q" },
                    { text: "领导认可我！我要更努力", type: "H" }
                ]
            },
            {
                text: "公司说'我们是一家人'，你觉得？",
                options: [
                    { text: "资本家的套路，别当真", type: "Q" },
                    { text: "公司氛围真好，有归属感", type: "H" }
                ]
            }
        ];

        // 13种牛马人格类型
        const personalityTypes = {
            "MS TQ": {
                enName: "MO-YU",
                cnName: "摸鱼哲学家",
                emoji: "🦥",
                description: "职场里的'佛系大师'，深谙摸鱼之道，但摸得有水平、有境界。座右铭：'努力不一定成功，但不努力一定很舒服。'",
                traits: { M: "摸鱼高手", S: "社恐本恐", T: "躺平达人", Q: "人间清醒" },
                tips: "别太佛系，关键时刻要展示实力，不然容易被边缘化。"
            },
            "MS TH": {
                enName: "FOXI",
                cnName: "佛系小透明",
                emoji: "🪷",
                description: "职场里的'隐形人'，存在感极低但也不惹事。喜欢安静地完成工作，然后安静地摸鱼。",
                traits: { M: "摸鱼高手", S: "社恐本恐", T: "躺平达人", H: "单纯可爱" },
                tips: "偶尔主动一点，让领导看到你的存在。"
            },
            "MS PQ": {
                enName: "JUAN-er",
                cnName: "隐形卷王",
                emoji: "👻",
                description: "表面佛系摸鱼，实则在默默提升自己。目标是：让所有人低估你，然后惊艳所有人。",
                traits: { M: "摸鱼高手", S: "社恐本恐", P: "奋斗达人", Q: "人间清醒" },
                tips: "记得适当展示成果，不然你的努力可能被忽视。"
            },
            "MS PH": {
                enName: "Lonly",
                cnName: "社恐奋斗者",
                emoji: "😱",
                description: "职场里的'独行侠'，不喜欢社交但很努力。相信'实力说话'。",
                traits: { M: "摸鱼高手", S: "社恐本恐", P: "奋斗达人", H: "单纯可爱" },
                tips: "职场不只是做事，还要做人。偶尔和同事聊聊天。"
            },
            "MK TQ": {
                enName: "IM-IN",
                cnName: "社交摸鱼王",
                emoji: "🐬",
                description: "职场里的'交际花'，擅长通过社交来摸鱼。座右铭：'会摸鱼的牛马，才是好牛马。'",
                traits: { M: "摸鱼高手", K: "社牛达人", T: "躺平达人", Q: "人间清醒" },
                tips: "别只顾着摸鱼，关键时刻还是要拿出真本事。"
            },
            "MK TH": {
                enName: "Pony-MA",
                cnName: "快乐小牛马",
                emoji: "😎",
                description: "职场里的'开心果'，性格开朗，喜欢摸鱼，对职场充满乐观。",
                traits: { M: "摸鱼高手", K: "社牛达人", T: "躺平达人", H: "单纯可爱" },
                tips: "别太放松，关键时刻还是要靠谱一点。"
            },
            "MK PQ": {
                enName: "OIL-er",
                cnName: "职场老油条",
                emoji: "🐙",
                description: "摸鱼和奋斗都能拿捏，知道什么时候该表现，什么时候该低调。",
                traits: { M: "摸鱼高手", K: "社牛达人", P: "奋斗达人", Q: "人间清醒" },
                tips: "继续保持，但别忘了初心。"
            },
            "JS TQ": {
                enName: "COOL-er",
                cnName: "高冷卷王",
                emoji: "🦅",
                description: "职场里的'独狼'，卷王中的卷王，但从不张扬。目标：用实力说话。",
                traits: { J: "卷王之王", S: "社恐本恐", T: "躺平达人", Q: "人间清醒" },
                tips: "职场也需要人情世故，偶尔和同事互动。"
            },
            "JS PQ": {
                enName: "NO-BUG",
                cnName: "技术宅卷王",
                emoji: "⌨️",
                description: "职场里的'技术大神'，专注提升自己，不参与职场社交。",
                traits: { J: "卷王之王", S: "社恐本恐", P: "奋斗达人", Q: "人间清醒" },
                tips: "职场也需要软技能，适当展示自己。"
            },
            "JK TQ": {
                enName: "CTRL",
                cnName: "职场精英",
                emoji: "💼",
                description: "既会卷又会社交，但心里门儿清。目标：在职场游刃有余。",
                traits: { J: "卷王之王", K: "社牛达人", T: "躺平达人", Q: "人间清醒" },
                tips: "继续保持，但别忘了初心和底线。"
            },
            "JK TH": {
                enName: "SHINE-er",
                cnName: "阳光卷王",
                emoji: "🌻",
                description: "职场里的'正能量担当'，热爱工作，热爱社交，对职场充满热情。",
                traits: { J: "卷王之王", K: "社牛达人", T: "躺平达人", H: "单纯可爱" },
                tips: "别让过度乐观蒙蔽了判断，职场也需要清醒。"
            },
            "JK PQ": {
                enName: "BOSS",
                cnName: "职场大佬",
                emoji: "🦁",
                description: "职场里的'领袖型人物'，既能卷又能社交，还有清晰的目标。",
                traits: { J: "卷王之王", K: "社牛达人", P: "奋斗达人", Q: "人间清醒" },
                tips: "别太强势，给他人成长的空间。"
            },
            "JK PH": {
                enName: "IM-KING",
                cnName: "卷王之王",
                emoji: "👑",
                description: "职场里的'卷王之王'，热爱工作，热爱社交。座右铭：'今天比昨天更努力。'",
                traits: { J: "卷王之王", K: "社牛达人", P: "奋斗达人", H: "单纯可爱" },
                tips: "注意工作生活平衡，偶尔也要放松一下。"
            }
        };

        let currentQuestion = 0;
        let scores = { M: 0, J: 0, S: 0, K: 0, T: 0, P: 0, Q: 0, H: 0 };

        function startTest() {
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('testPage').style.display = 'block';
            currentQuestion = 0;
            scores = { M: 0, J: 0, S: 0, K: 0, T: 0, P: 0, Q: 0, H: 0 };
            showQuestion();
        }

        function showQuestion() {
            const question = questions[currentQuestion];
            document.getElementById('questionText').textContent = question.text;
            document.getElementById('questionCounter').textContent = `${currentQuestion + 1} / ${questions.length}`;
            document.getElementById('progressFill').style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            question.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option.text;
                btn.onclick = () => selectOption(option.type);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(type) {
            scores[type]++;

            currentQuestion++;
            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('testPage').style.display = 'none';
            document.getElementById('resultPage').style.display = 'block';

            // 计算人格类型
            const type = 
                (scores.M >= scores.J ? 'M' : 'J') +
                (scores.S >= scores.K ? 'S' : 'K') +
                ' ' +
                (scores.T >= scores.P ? 'T' : 'P') +
                (scores.Q >= scores.H ? 'Q' : 'H');

            const result = personalityTypes[type];

            // 如果没有匹配到结果，显示默认提示
            if (!result) {
                document.getElementById('resultEmoji').textContent = "🤔";
                document.getElementById('resultName').innerHTML = `<span class="en-name">UNKNOWN</span><span class="cn-name">神秘牛马</span>`;
                document.getElementById('resultType').textContent = type;
                document.getElementById('resultDescription').innerHTML = "你的组合太独特了，暂无匹配的人格类型。";
                document.getElementById('resultTraits').innerHTML = "";
                document.getElementById('resultTips').innerHTML = "<p>继续保持你的独特！</p>";
                return;
            }

            document.getElementById('resultEmoji').textContent = result.emoji;
            document.getElementById('resultName').innerHTML = `<span class="en-name">${result.enName}</span><span class="cn-name">${result.cnName}</span>`;
            document.getElementById('resultType').textContent = type;
            document.getElementById('resultDescription').innerHTML = result.description.replace(/\n/g, '<br>');

            // 显示特质
            const traitsContainer = document.getElementById('resultTraits');
            traitsContainer.innerHTML = '';
            const dimensionNames = {
                M: '摸鱼指数', J: '卷王指数',
                S: '社恐指数', K: '社牛指数',
                T: '躺平指数', P: '奋斗指数',
                Q: '清醒指数', H: '糊涂指数'
            };
            
            const activeTraits = type.replace(' ', '').split('');
            activeTraits.forEach(trait => {
                const item = document.createElement('div');
                item.className = 'trait-item';
                item.innerHTML = `
                    <div class="trait-label">${dimensionNames[trait]}</div>
                    <div class="trait-value">${result.traits[trait]}</div>
                `;
                traitsContainer.appendChild(item);
            });

            document.getElementById('resultTips').innerHTML = `
                <h4>💡 职场建议</h4>
                <p>${result.tips}</p>
            `;
        }

        function restartTest() {
            document.getElementById('resultPage').style.display = 'none';
            document.getElementById('homePage').style.display = 'block';
        }
    </script>
</body>
</html>
