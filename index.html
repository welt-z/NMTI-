<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMTI 牛马测试 - 发现你的职场人格</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        /* 首页样式 */
        .home-page {
            padding: 60px 40px;
            text-align: center;
        }

        .logo {
            font-size: 72px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }

        .subtitle {
            font-size: 18px;
            color: #666;
            margin-bottom: 40px;
        }

        .intro-text {
            font-size: 16px;
            color: #888;
            line-height: 1.8;
            margin-bottom: 40px;
            padding: 0 20px;
        }

        .dimensions-preview {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

        .dimension-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            text-align: left;
        }

        .dimension-card h3 {
            font-size: 14px;
            color: #999;
            margin-bottom: 8px;
        }

        .dimension-card p {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 60px;
            font-size: 20px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        /* 测试页面样式 */
        .test-page {
            display: none;
            padding: 40px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 0.3s;
        }

        .question-counter {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .question-text {
            font-size: 22px;
            font-weight: 600;
            color: #333;
            text-align: center;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            background: #f8f9fa;
            border: 2px solid #eee;
            padding: 20px 25px;
            font-size: 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }

        .option-btn:hover {
            background: #f0f0ff;
            border-color: #667eea;
        }

        /* 结果页面样式 */
        .result-page {
            display: none;
            padding: 50px 40px;
            text-align: center;
        }

        .result-type {
            font-size: 64px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .result-name {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 30px;
        }

        .result-emoji {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .result-description {
            font-size: 16px;
            color: #666;
            line-height: 1.8;
            text-align: left;
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .result-traits {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .trait-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: left;
        }

        .trait-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
        }

        .trait-value {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .result-tips {
            background: linear-gradient(135deg, #fff5f5 0%, #fff0f5 100%);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: left;
        }

        .result-tips h4 {
            color: #e91e63;
            margin-bottom: 10px;
        }

        .result-tips p {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }

        .restart-btn {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .restart-btn:hover {
            background: #667eea;
            color: white;
        }

        .share-text {
            margin-top: 20px;
            font-size: 14px;
            color: #999;
        }

        @media (max-width: 600px) {
            .title {
                font-size: 36px;
            }
            .dimensions-preview {
                grid-template-columns: 1fr;
            }
            .result-traits {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 首页 -->
        <div class="home-page" id="homePage">
            <div class="logo">🐂🐎</div>
            <h1 class="title">NMTI 牛马测试</h1>
            <p class="subtitle">发现你的职场人格，认清你的牛马本质</p>
            
            <div class="intro-text">
                你是职场里的哪种牛马？是摸鱼高手还是卷王之王？<br>
                是社恐患者还是社牛达人？是躺平派还是奋斗逼？<br>
                完成测试，解锁你的专属牛马人格！
            </div>

            <div class="dimensions-preview">
                <div class="dimension-card">
                    <h3>维度一</h3>
                    <p>M 摸鱼型 ↔ J 卷王型</p>
                </div>
                <div class="dimension-card">
                    <h3>维度二</h3>
                    <p>S 社恐型 ↔ K 社牛型</p>
                </div>
                <div class="dimension-card">
                    <h3>维度三</h3>
                    <p>T 躺平型 ↔ P 奋斗型</p>
                </div>
                <div class="dimension-card">
                    <h3>维度四</h3>
                    <p>Q 清醒型 ↔ H 糊涂型</p>
                </div>
            </div>

            <button class="start-btn" onclick="startTest()">开始测试</button>
        </div>

        <!-- 测试页面 -->
        <div class="test-page" id="testPage">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="question-counter" id="questionCounter">1 / 20</div>
            <div class="question-text" id="questionText"></div>
            <div class="options" id="optionsContainer"></div>
        </div>

        <!-- 结果页面 -->
        <div class="result-page" id="resultPage">
            <div class="result-emoji" id="resultEmoji"></div>
            <div class="result-type" id="resultType"></div>
            <div class="result-name" id="resultName"></div>
            <div class="result-description" id="resultDescription"></div>
            <div class="result-traits" id="resultTraits"></div>
            <div class="result-tips" id="resultTips"></div>
            <button class="restart-btn" onclick="restartTest()">再测一次</button>
            <p class="share-text">截图分享给朋友，看看谁是你的职场搭子</p>
        </div>
    </div>

    <script>
        // NMTI 测试题目
        const questions = [
            // M/J 维度 - 摸鱼 vs 卷王
            {
                text: "周五下午5点，领导突然在群里发了一条消息，你会？",
                options: [
                    { text: "假装没看见，周一再说", type: "M" },
                    { text: "秒回'收到'并立即处理", type: "J" }
                ]
            },
            {
                text: "你的工作电脑上，摸鱼窗口和办公窗口的比例是？",
                options: [
                    { text: "摸鱼窗口永远最小化，随时准备切换", type: "M" },
                    { text: "几乎全是办公窗口，偶尔才打开微信", type: "J" }
                ]
            },
            {
                text: "领导布置了一个任务，要求'下周完成'，你通常会？",
                options: [
                    { text: "最后一天晚上才开始做", type: "M" },
                    { text: "当天就开始规划，争取提前完成", type: "J" }
                ]
            },
            {
                text: "同事在朋友圈晒加班，你的内心OS是？",
                options: [
                    { text: "卷王又在表演了，呵呵", type: "M" },
                    { text: "他好努力啊，我也要加油", type: "J" }
                ]
            },
            {
                text: "开会时，你通常在做什么？",
                options: [
                    { text: "神游太虚，或者偷偷刷手机", type: "M" },
                    { text: "认真记笔记，积极发言", type: "J" }
                ]
            },

            // S/K 维度 - 社恐 vs 社牛
            {
                text: "公司团建，你最期待的是？",
                options: [
                    { text: "能不去就不去，去了也是躲在角落", type: "S" },
                    { text: "太棒了！又能认识新朋友了", type: "K" }
                ]
            },
            {
                text: "电梯里遇到不太熟的同事，你会？",
                options: [
                    { text: "低头看手机，祈祷电梯快点到", type: "S" },
                    { text: "主动打招呼，顺便聊几句", type: "K" }
                ]
            },
            {
                text: "需要跨部门沟通时，你更倾向于？",
                options: [
                    { text: "发消息或邮件，能不打电话就不打", type: "S" },
                    { text: "直接走过去当面说，效率最高", type: "K" }
                ]
            },
            {
                text: "年会上被抽中上台表演，你的反应是？",
                options: [
                    { text: "社死现场，想找个地缝钻进去", type: "S" },
                    { text: "来都来了，给大家整点才艺", type: "K" }
                ]
            },
            {
                text: "同事在群里发红包，你通常会？",
                options: [
                    { text: "默默抢，不说话", type: "S" },
                    { text: "抢完发个表情包，顺便带节奏", type: "K" }
                ]
            },

            // T/P 维度 - 躺平 vs 奋斗
            {
                text: "看到同事跳槽涨薪50%，你的想法是？",
                options: [
                    { text: "他好累吧，我这样挺好的", type: "T" },
                    { text: "我也要提升自己，争取更好的机会", type: "P" }
                ]
            },
            {
                text: "周末你的状态通常是？",
                options: [
                    { text: "睡到自然醒，追剧打游戏", type: "T" },
                    { text: "学习充电，或者做副业", type: "P" }
                ]
            },
            {
                text: "对于'35岁危机'，你的态度是？",
                options: [
                    { text: "到时候再说吧，船到桥头自然直", type: "T" },
                    { text: "现在就要未雨绸缪，提前规划", type: "P" }
                ]
            },
            {
                text: "领导说'年轻人要多学习'，你的内心是？",
                options: [
                    { text: "又在画饼，我只想按时下班", type: "T" },
                    { text: "确实要提升，机会留给有准备的人", type: "P" }
                ]
            },
            {
                text: "你理想的工作状态是？",
                options: [
                    { text: "钱多事少离家近，能摸鱼就摸鱼", type: "T" },
                    { text: "有挑战有成长，能学到东西最重要", type: "P" }
                ]
            },

            // Q/H 维度 - 清醒 vs 糊涂
            {
                text: "领导说'你很有潜力'，你的理解是？",
                options: [
                    { text: "画饼而已，听听就好", type: "Q" },
                    { text: "领导认可我！我要更努力", type: "H" }
                ]
            },
            {
                text: "公司说'我们是一家人'，你觉得？",
                options: [
                    { text: "资本家的套路，别当真", type: "Q" },
                    { text: "公司氛围真好，有归属感", type: "H" }
                ]
            },
            {
                text: "同事请你帮忙做不属于你的工作，你会？",
                options: [
                    { text: "委婉拒绝，这不是我的职责", type: "Q" },
                    { text: "能帮就帮，大家都是同事", type: "H" }
                ]
            },
            {
                text: "年终奖比预期少，你的反应是？",
                options: [
                    { text: "公司效益不好，该考虑跳槽了", type: "Q" },
                    { text: "有就不错了，明年继续努力", type: "H" }
                ]
            },
            {
                text: "看到朋友圈有人晒'奋斗到凌晨'，你觉得？",
                options: [
                    { text: "效率低的表现，不值得提倡", type: "Q" },
                    { text: "好励志啊，成功需要付出", type: "H" }
                ]
            }
        ];

        // 16种牛马人格类型
        const personalityTypes = {
            "MS TQ": {
                name: "摸鱼哲学家",
                emoji: "🦥",
                description: "你是职场里的'佛系大师'，深谙摸鱼之道，但摸得有水平、有境界。你清楚地知道什么时候该努力、什么时候可以放松，从不做无用功。你的座右铭是：'努力不一定成功，但不努力一定很舒服。'\n\n你擅长在完成本职工作的同时，给自己留出充足的休息时间。领导觉得你靠谱，同事觉得你佛系，其实你只是活得通透。",
                traits: { M: "摸鱼高手", S: "社恐本恐", T: "躺平达人", Q: "人间清醒" },
                tips: "你的职场生存能力很强，但要注意别太佛系，关键时刻还是要展示一下实力，不然容易被边缘化。"
            },
            "MS TH": {
                name: "佛系小透明",
                emoji: "👻",
                description: "你是职场里的'隐形人'，存在感极低但也不惹事。你喜欢安静地完成工作，然后安静地摸鱼。领导对你的印象是'老实人'，同事对你的印象是'不太熟'。\n\n你不是不想努力，只是觉得没必要那么拼。你对职场画饼深信不疑，但也懒得去追求，主打一个随遇而安。",
                traits: { M: "摸鱼高手", S: "社恐本恐", T: "躺平达人", H: "单纯可爱" },
                tips: "你的佛系让你少了很多烦恼，但也可能让你错过机会。偶尔主动一点，让领导看到你的存在。"
            },
            "MS PQ": {
                name: "隐形卷王",
                emoji: "🦊",
                description: "你是职场里的'暗夜刺客'，表面佛系摸鱼，实则在默默提升自己。你清楚地知道职场本质，所以选择'低调发育'。同事以为你在摸鱼，其实你在学习；领导以为你在划水，其实你在思考。\n\n你的目标是：让所有人低估你，然后惊艳所有人。",
                traits: { M: "摸鱼高手", S: "社恐本恐", P: "奋斗达人", Q: "人间清醒" },
                tips: "你的策略很聪明，但记得适当展示成果，不然你的努力可能被忽视。"
            },
            "MS PH": {
                name: "社恐奋斗逼",
                emoji: "🐹",
                description: "你是职场里的'独行侠'，不喜欢社交但很努力。你相信'实力说话'，所以把精力都放在提升自己上。团建你不去，但加班你从不缺席。\n\n你的困惑是：为什么我这么努力，升职的却是那个天天拍马屁的？",
                traits: { M: "摸鱼高手", S: "社恐本恐", P: "奋斗达人", H: "单纯可爱" },
                tips: "职场不只是做事，还要做人。偶尔和同事聊聊天，对你的职业发展有帮助。"
            },
            "MK TQ": {
                name: "社交摸鱼王",
                emoji: "🐬",
                description: "你是职场里的'交际花'，摸鱼能力一流，但摸得很有技巧。你擅长通过社交来摸鱼——和同事聊天、帮领导跑腿、参加各种活动。看起来很忙，其实都在摸鱼。\n\n你深谙职场规则，知道怎么让自己过得舒服。你的座右铭是：'会摸鱼的牛马，才是好牛马。'",
                traits: { M: "摸鱼高手", K: "社牛达人", T: "躺平达人", Q: "人间清醒" },
                tips: "你的社交能力是你的优势，但别只顾着摸鱼，关键时刻还是要拿出真本事。"
            },
            "MK TH": {
                name: "快乐小牛马",
                emoji: "🐄",
                description: "你是职场里的'开心果'，性格开朗，喜欢摸鱼，对职场充满乐观。你觉得工作就是赚钱，没必要太认真。你经常组织同事一起摸鱼，是摸鱼小分队的核心成员。\n\n你的快乐感染着身边的人，虽然经常被领导批评，但你从不往心里去。",
                traits: { M: "摸鱼高手", K: "社牛达人", T: "躺平达人", H: "单纯可爱" },
                tips: "你的乐观很珍贵，但要注意别太放松，关键时刻还是要靠谱一点。"
            },
            "MK PQ": {
                name: "职场老油条",
                emoji: "🐙",
                description: "你是职场里的'老司机'，摸鱼和奋斗都能拿捏。你清楚职场本质，所以选择'边摸鱼边提升'。你擅长社交，知道什么时候该表现，什么时候该低调。\n\n你是新同事眼中的'职场导师'，经常分享摸鱼技巧和职场生存法则。",
                traits: { M: "摸鱼高手", K: "社牛达人", P: "奋斗达人", Q: "人间清醒" },
                tips: "你已经掌握了职场生存的精髓，继续保持，但别忘了初心。"
            },
            "MK PH": {
                name: "社交卷王",
                emoji: "🦚",
                description: "你是职场里的'明星'，既爱社交又爱奋斗。你喜欢在领导面前表现，在同事面前展示。你的朋友圈全是工作相关，年会表演你从不缺席。\n\n你的座右铭是：'让所有人都看到我的努力。' 同事对你的评价两极分化，有人觉得你优秀，有人觉得你太卷。",
                traits: { M: "摸鱼高手", K: "社牛达人", P: "奋斗达人", H: "单纯可爱" },
                tips: "你的热情和努力值得肯定，但要注意别让同事感到压力，适度低调一点。"
            },
            "JS TQ": {
                name: "高冷卷王",
                emoji: "🦅",
                description: "你是职场里的'独狼'，卷王中的卷王，但从不张扬。你清楚地知道自己要什么，所以默默努力，不参与职场社交。同事觉得你高冷，其实你只是专注。\n\n你的目标是：用实力说话，让成果证明一切。加班对你来说是常态，但你从不发朋友圈。",

        };

        let currentQuestion = 0;
        let scores = { M: 0, J: 0, S: 0, K: 0, T: 0, P: 0, Q: 0, H: 0 };

        function startTest() {
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('testPage').style.display = 'block';
            currentQuestion = 0;
            scores = { M: 0, J: 0, S: 0, K: 0, T: 0, P: 0, Q: 0, H: 0 };
            showQuestion();
        }

        function showQuestion() {
            const question = questions[currentQuestion];
            document.getElementById('questionText').textContent = question.text;
            document.getElementById('questionCounter').textContent = `${currentQuestion + 1} / ${questions.length}`;
            document.getElementById('progressFill').style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            question.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option.text;
                btn.onclick = () => selectOption(option.type);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(type) {
            scores[type]++;

            currentQuestion++;
            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('testPage').style.display = 'none';
            document.getElementById('resultPage').style.display = 'block';

            // 计算人格类型
            const type = 
                (scores.M >= scores.J ? 'M' : 'J') +
                (scores.S >= scores.K ? 'S' : 'K') +
                ' ' +
                (scores.T >= scores.P ? 'T' : 'P') +
                (scores.Q >= scores.H ? 'Q' : 'H');

            const result = personalityTypes[type];

            document.getElementById('resultEmoji').textContent = result.emoji;
            document.getElementById('resultType').textContent = type;
            document.getElementById('resultName').textContent = result.name;
            document.getElementById('resultDescription').innerHTML = result.description.replace(/\n/g, '<br>');

            // 显示特质
            const traitsContainer = document.getElementById('resultTraits');
            traitsContainer.innerHTML = '';
            const dimensionNames = {
                M: '摸鱼指数', J: '卷王指数',
                S: '社恐指数', K: '社牛指数',
                T: '躺平指数', P: '奋斗指数',
                Q: '清醒指数', H: '糊涂指数'
            };
            
            const activeTraits = type.replace(' ', '').split('');
            activeTraits.forEach(trait => {
                const item = document.createElement('div');
                item.className = 'trait-item';
                item.innerHTML = `
                    <div class="trait-label">${dimensionNames[trait]}</div>
                    <div class="trait-value">${result.traits[trait]}</div>
                `;
                traitsContainer.appendChild(item);
            });

            document.getElementById('resultTips').innerHTML = `
                <h4>💡 职场建议</h4>
                <p>${result.tips}</p>
            `;
        }

        function restartTest() {
            document.getElementById('resultPage').style.display = 'none';
            document.getElementById('homePage').style.display = 'block';
        }
    </script>
